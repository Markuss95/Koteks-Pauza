# Netlify hosts the React frontend only. The Express + SQLite backend must run
# on a separate Node host with persistent storage (see README "Deployment").

[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the backend so the browser stays same-origin (no CORS).
# Replace the host below with your deployed backend URL, then redeploy.
[[redirects]]
  from = "/api/*"
  to = "https://koteks-pauza.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — serve index.html for any non-asset route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
